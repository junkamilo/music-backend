spring.application.name=backend-core
spring.config.import=optional:file:.env[.properties]

# Puerto del servidor webserver.port=8080

# Datasource — PostgreSQL en Render (pruebas)
spring.datasource.url=jdbc:postgresql://dpg-d8u2pkog4nts73di57q0-a.oregon-postgres.render.com:5432/music_platform_db_e5vz?sslmode=require
spring.datasource.username=music_platform_db
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: valida que las entidades coincidan con las tablas creadas por Flyway
spring.jpa.hibernate.ddl-auto=validate
# Muestra en consola las consultas SQL que Java hace por detrás
spring.jpa.show-sql=true

# Configuración de Flyway
spring.flyway.enabled=true

# JWT
app.jwt.secret=music-platform-jwt-secret-key-change-in-production-min-32-chars
app.jwt.access-expiration-minutes=15
app.jwt.refresh-expiration-days=30

# Email verification
app.email.provider=log
app.email.from=noreply@music-platform.local
app.email.verification-expiry-hours=24
app.email.frontend-base-url=http://localhost:3000
# app.email.resend-api-key=re_xxxxxxxxxxxx

# Spotify
spotify.client.id=${SPOTIFY_CLIENT_ID}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET}
spotify.client.market=US

# Spotify sync scheduler
app.spotify.sync.enabled=true
app.spotify.sync.cron=0 0 3 * * *

# Cache
spring.cache.type=caffeine
app.cache.highlighted-artists.ttl-minutes=5

# Logging
logging.level.com.musicplatform=DEBUG
logging.level.org.springframework.web=INFO